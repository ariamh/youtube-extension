<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 270px;
      margin: 0;
      padding: 16px;
      font-family: "Roboto", Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
    }
    h1 { font-size: 15px; margin: 0 0 4px; }
    p { font-size: 12px; color: #aaa; margin: 0 0 14px; line-height: 1.4; }
    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .label { font-size: 13px; }
    .switch { position: relative; width: 44px; height: 24px; flex: none; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; cursor: pointer;
      background: #555; border-radius: 24px; transition: .2s;
    }
    .slider:before {
      content: ""; position: absolute; height: 18px; width: 18px;
      left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s;
    }
    input:checked + .slider { background: #cc0000; }
    input:checked + .slider:before { transform: translateX(20px); }
    .status { font-size: 12px; }
    hr { border: none; border-top: 1px solid #2a2a2a; margin: 14px 0; }
    .sub { font-size: 11px; color: #888; margin: 4px 0 8px; line-height: 1.4; }
    textarea {
      width: 100%; box-sizing: border-box; height: 70px; resize: vertical;
      background: #1c1c1c; color: #fff; border: 1px solid #333; border-radius: 6px;
      font-size: 12px; padding: 6px; font-family: inherit;
    }
    button {
      margin-top: 8px; width: 100%; padding: 7px; border: none; border-radius: 6px;
      background: #3ea6ff; color: #000; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #5cb6ff; }
    .saved { font-size: 11px; color: #3ea6ff; margin-top: 6px; min-height: 14px; }
  </style>
</head>
<body>
  <h1>YT Buffer Glitch</h1>
  <p>Simulasi gangguan jaringan ~5 menit tiap kelipatan 2 menit waktu putar video YouTube.</p>
  <div class="row">
    <span class="label">Gangguan jaringan</span>
    <label class="switch">
      <input type="checkbox" id="toggle" />
      <span class="slider"></span>
    </label>
  </div>
  <div class="status" id="status"></div>

  <hr />

  <div class="row">
    <span class="label">Saring konten dewasa</span>
    <label class="switch">
      <input type="checkbox" id="filterToggle" />
      <span class="slider"></span>
    </label>
  </div>
  <div class="status" id="filterStatus"></div>
  <div class="sub">Sembunyikan video bila judul/channel mengandung kata terlarang (berbasis teks, tidak 100% akurat). Satu kata per baris:</div>
  <textarea id="blocklist" spellcheck="false"></textarea>
  <button id="save">Simpan daftar</button>
  <div class="saved" id="saved"></div>

  <script src="blocklist.js"></script>
  <script src="popup.js"></script>
</body>
</html>
